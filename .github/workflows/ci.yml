name: ci
on:
  push:
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: BOB spec gate (anti-drift)
        run: node scripts/bob_validate.mjs --strict .

      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
